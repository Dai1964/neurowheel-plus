<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e07a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NeuroWheel+">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>NeuroWheel+ ✨</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee;
  --panel: #fffaf4;
  --border: #e8d8c4;
  --text: #3d2f22;
  --text2: #7a6555;
  --text3: #b09a88;
  --accent: #e07a3a;
  --shadow: 0 4px 24px rgba(61,47,34,0.13);
  --radius: 20px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  font-size: 14px;
  user-select: none;
}

/* ── SCREENS ── */
.screen { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

/* ── WHEEL SCREEN ── */
#wheelScreen {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 50%, #f9f0e3 0%, var(--bg) 70%);
}

.wheel-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 0;
  z-index: 10;
}
.logo-small {
  font-family: 'Lora', serif;
  font-size: 1rem;
  color: var(--accent);
  font-style: italic;
}
.header-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: var(--shadow);
  transition: transform 0.15s, background 0.15s;
}
.icon-btn:hover, .icon-btn:active { transform: scale(0.93); background: var(--border); }

/* ── ENERGY FILTER ── */
.energy-filter {
  position: absolute;
  top: 60px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 16px;
  z-index: 9;
}
.energy-pill {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
}
.energy-pill.active { background: var(--accent); border-color: var(--accent); color: white; }
.energy-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.wheel-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wheel-pointer {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 16px solid var(--accent);
  z-index: 6;
  filter: drop-shadow(0 2px 4px rgba(61,47,34,0.25));
}

#wheelSvg {
  filter: drop-shadow(0 8px 32px rgba(61,47,34,0.18));
  transform: rotate(0deg);
}

/* Centre circle button */
.centre-btn {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--panel);
  border: 3px solid var(--border);
  box-shadow: 0 2px 16px rgba(61,47,34,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  gap: 2px;
  transition: transform 0.15s, background 0.15s;
  z-index: 5;
}
.centre-btn:hover, .centre-btn:active { transform: scale(0.92); background: var(--bg); }
.centre-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
.centre-icon { font-size: 1.4rem; }

.done-count {
  position: absolute;
  bottom: -44px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text3);
  white-space: nowrap;
  background: var(--panel);
  border: 1.5px solid var(--border);
  padding: 5px 14px;
  border-radius: 30px;
  text-align: center;
}

.pool-count {
  position: absolute;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.68rem;
  color: var(--text3);
  white-space: nowrap;
}

/* ── SEGMENT LABEL ── */
.seg-text {
  pointer-events: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fdf6ee;
  padding: 9px 18px;
  border-radius: 30px;
  font-size: 0.78rem;
  font-weight: 700;
  opacity: 0;
  transition: all 0.28s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.toast-action {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.4);
  color: inherit;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.72rem;
  font-weight: 800;
  cursor: pointer;
  display: none;
  font-family: 'Nunito', sans-serif;
}
.toast-action:hover { background: rgba(255,255,255,0.3); }

/* ── MODALS ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,47,34,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.overlay.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--panel);
  border-radius: 24px;
  padding: 24px 22px;
  width: min(92vw, 420px);
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 12px 48px rgba(61,47,34,0.25);
  animation: modalIn 0.22s ease;
  position: relative;
}
@keyframes modalIn { from{transform:scale(0.93) translateY(10px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

.modal-title {
  font-family: 'Lora', serif;
  font-size: 1.15rem;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-sub { font-size: 0.78rem; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }

.modal-close {
  position: absolute;
  top: 18px; right: 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--border); }

/* Task detail modal */
.task-detail-name {
  font-family: 'Lora', serif;
  font-size: 1.3rem;
  line-height: 1.4;
  margin-bottom: 6px;
}
.task-detail-cat {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}
.task-history-row {
  background: var(--bg);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.task-history-label { font-size: 0.78rem; color: var(--text2); font-weight: 600; }
.task-history-val { font-size: 0.88rem; font-weight: 800; color: var(--text); }

/* Timer in detail */
.mini-timer {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  margin-top: 14px;
}
.mini-timer-time {
  font-family: 'Lora', serif;
  font-size: 2.6rem;
  letter-spacing: 2px;
  color: var(--text);
}
.mini-timer-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 14px;
}
.timer-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.tbtn {
  padding: 8px 18px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tbtn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.tbtn.done-btn { background: #5ab88a; color: white; border-color: #5ab88a; }
.tbtn:hover { opacity: 0.85; }

.detail-note {
  margin-top: 14px;
  font-size: 0.8rem;
  color: var(--text2);
  background: var(--bg);
  border-radius: 12px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  line-height: 1.65;
}

/* ── STATS ── */
.stat-bars {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 6px;
  margin-top: 18px;
  height: 84px;
  padding: 0 4px;
}
.stat-bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
.stat-bar {
  width: 100%;
  max-width: 24px;
  background: var(--accent);
  border-radius: 6px 6px 3px 3px;
  min-height: 4px;
  transition: height 0.3s ease;
}
.stat-bar-label { font-size: 0.65rem; color: var(--text3); font-weight: 700; }

/* ── SETUP SCREEN ── */
#setupScreen {
  background: var(--bg);
  overflow-y: auto;
  align-items: stretch;
  justify-content: flex-start;
}
.setup-wrap {
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.setup-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.setup-title {
  font-family: 'Lora', serif;
  font-size: 1.4rem;
  color: var(--text);
}
.back-btn {
  padding: 8px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
}
.back-btn:hover { background: var(--border); }

.setup-section {
  background: var(--panel);
  border-radius: 20px;
  padding: 20px;
  border: 1.5px solid var(--border);
  margin-bottom: 18px;
}
.setup-section-title {
  font-weight: 800;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text3);
  margin-bottom: 14px;
}

/* Task list in setup */
.task-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.task-list-item:last-child { border-bottom: none; }
.task-list-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  border: 2px solid rgba(0,0,0,0.15);
}
.task-list-name {
  flex: 1;
  min-width: 100px;
  font-size: 0.87rem;
  font-weight: 600;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Nunito', sans-serif;
  padding: 2px 0;
}
.task-list-name:focus {
  border-bottom: 1.5px solid var(--accent);
}
.task-cat-select {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  outline: none;
  color: var(--text);
}
.task-del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 1rem;
  padding: 2px 4px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.task-del-btn:hover { color: #c04040; background: #fde8e8; }

.add-task-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.add-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.add-input:focus { border-color: var(--accent); }
.add-submit {
  padding: 9px 16px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.add-submit:hover { opacity: 0.85; }

/* Category config */
.cat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.cat-row:last-child { border-bottom: none; }
.cat-color-swatch {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid rgba(0,0,0,0.1);
  cursor: pointer;
  flex-shrink: 0;
}
.cat-icon-input {
  width: 34px;
  text-align: center;
  font-size: 1rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  outline: none;
  padding: 4px 0;
  flex-shrink: 0;
  font-family: 'Nunito', sans-serif;
}
.cat-icon-input:focus { border-color: var(--accent); }
.cat-name-input {
  flex: 1;
  min-width: 60px;
  font-size: 0.87rem;
  font-weight: 600;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  padding: 2px 0;
}
.cat-name-input:focus { border-bottom: 1.5px solid var(--accent); }
.cat-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:1rem; }
.cat-del:hover { color: #c04040; }

/* Colour picker hidden input */
.color-pick { position:absolute; opacity:0; width:0; height:0; }

/* Save button */
.save-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.02em;
  transition: opacity 0.15s, transform 0.1s;
}
.save-btn:hover { opacity: 0.88; transform: scale(0.99); }

/* ── SEGMENT TICK ANIMATION ── */
@keyframes segDone {
  0%   { opacity: 1; transform: scale(1); }
  40%  { opacity: 1; transform: scale(1.06); }
  100% { opacity: 0; transform: scale(0.85); }
}
@keyframes segIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}
.seg-anim-done { animation: segDone 0.45s ease forwards; }
.seg-anim-in   { animation: segIn 0.35s ease forwards; }

/* ── EMPTY STATE ── */
.empty-msg {
  text-align: center;
  padding: 32px 20px;
  font-size: 0.85rem;
  color: var(--text3);
  line-height: 1.7;
}

/* ── SCROLL ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE WHEEL SIZE ── */
@media (max-height: 700px) {
  .wheel-wrap { transform: scale(0.85); }
}
@media (max-height: 560px) {
  .wheel-wrap { transform: scale(0.7); }
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  #wheelSvg { transition: none !important; }
  .seg-anim-done, .seg-anim-in { animation: none !important; }
  .overlay, .modal, .toast { animation: none !important; transition: opacity 0.1s !important; }
}
</style>
</head>
<body>

<!-- WHEEL SCREEN -->
<div class="screen active" id="wheelScreen">
  <div class="wheel-header">
    <div class="logo-small">NeuroWheel+ ✨</div>
    <div class="header-btns">
      <button class="icon-btn" id="shuffleAllBtn" title="Shuffle all 8 tasks" aria-label="Shuffle all 8 tasks">🔀</button>
      <button class="icon-btn" id="statsBtn" title="Streak & stats" aria-label="View streak and stats">📊</button>
      <button class="icon-btn" id="remindersBtn" title="Reminders" aria-label="Set reminders">⏰</button>
      <button class="icon-btn" id="setupBtn" title="Edit task list" aria-label="Edit task list and categories">⚙️</button>
    </div>
  </div>

  <div class="energy-filter" id="energyFilter" role="group" aria-label="Filter tasks by energy level">
    <button class="energy-pill" data-energy="any">✨ Any</button>
    <button class="energy-pill" data-energy="low">🪫 Low</button>
    <button class="energy-pill" data-energy="medium">⚡ Med</button>
    <button class="energy-pill" data-energy="high">🔥 High</button>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="wheel-pointer" aria-hidden="true"></div>
    <svg id="wheelSvg" viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
    <button class="centre-btn" id="centreBtn" aria-label="Spin the wheel to pick a random task">
      <span class="centre-icon">🎡</span>
      <span id="centreLabel">Spin</span>
    </button>
  </div>

  <div class="done-count" id="doneCount">0 done today</div>
  <div class="pool-count" id="poolCount"></div>
</div>

<!-- SETUP SCREEN -->
<div class="screen" id="setupScreen">
  <div class="setup-wrap">
    <div class="setup-header">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="setup-title">Task List & Categories</div>
    </div>

    <!-- Categories -->
    <div class="setup-section">
      <div class="setup-section-title">Categories, Icons & Colours</div>
      <div id="catList"></div>
      <div class="add-task-row" style="margin-top:12px">
        <input class="add-input" id="newCatInput" placeholder="New category name…" maxlength="24">
        <button class="add-submit" id="addCatBtn">Add</button>
      </div>
    </div>

    <!-- Task pool -->
    <div class="setup-section">
      <div class="setup-section-title">Master Task Pool</div>
      <div id="taskPoolList"></div>
      <div class="add-task-row">
        <input class="add-input" id="newTaskInput" placeholder="Add a task to the pool…" maxlength="60">
        <button class="add-submit" id="addTaskBtn">Add</button>
      </div>
    </div>

    <!-- Data -->
    <div class="setup-section">
      <div class="setup-section-title">Your Data</div>
      <div class="modal-sub" style="margin-bottom:12px">Back up your tasks and history to a file, or restore from one — nothing leaves your device.</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="tbtn" id="exportBtn">⬇️ Export backup</button>
        <button class="tbtn" id="importBtn">⬆️ Import backup</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>

    <button class="save-btn" id="saveSetupBtn">✅ Save & go back to my wheel</button>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal">
    <button class="modal-close" id="detailClose" aria-label="Close">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- STATS MODAL -->
<div class="overlay" id="statsOverlay">
  <div class="modal" id="statsModal">
    <button class="modal-close" id="statsClose" aria-label="Close">✕</button>
    <div id="statsContent"></div>
  </div>
</div>

<!-- REMINDERS MODAL -->
<div class="overlay" id="remindersOverlay">
  <div class="modal" id="remindersModal">
    <button class="modal-close" id="remindersClose" aria-label="Close">✕</button>
    <div id="remindersContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-action" id="toastAction"></button>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE & DEFAULTS
// ─────────────────────────────────────────────
const WHEEL_SLOTS = 8;
const WHEEL_R = 170;
const INNER_R = 68;
const STORAGE_KEY = 'neurowheel_plus_v1';

let state = loadState();
let spinning = false;
let currentRotation = 0;
let lastDoneAction = null;

    remindersFired: {},   // { 'HH:MM_YYYY-MM-DD': true }
    activeTimers: {},     // { taskId: { startTs, accumMs, running } }
  };
}

function migrateState(s) {
  if (!s || typeof s !== 'object') return defaultState();
  const d = defaultState();
  s.categories = Array.isArray(s.categories) && s.categories.length ? s.categories.map(c => ({ icon: '⭐', ...c })) : d.categories;
  s.tasks = Array.isArray(s.tasks) ? s.tasks.map(t => ({ energy: 'medium', history: [], ...t })) : d.tasks;
  s.wheel = Array.isArray(s.wheel) ? s.wheel : [];
  s.doneToday = s.doneToday || 0;
  s.lastDate = s.lastDate || '';
  s.dailyCounts = (s.dailyCounts && typeof s.dailyCounts === 'object') ? s.dailyCounts : {};
  s.energyFilter = s.energyFilter || 'any';
  s.reminders = Array.isArray(s.reminders) ? s.reminders : [];
  s.remindersFired = (s.remindersFired && typeof s.remindersFired === 'object') ? s.remindersFired : {};
  s.activeTimers = (s.activeTimers && typeof s.activeTimers === 'object') ? s.activeTimers : {};
  return s;
}

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return migrateState(JSON.parse(s));
  } catch(e) {}
  return defaultState();
}

function saveState() {
  // Some in-app browsers (WhatsApp, Instagram, etc.) restrict or block
  // localStorage. If it throws, keep working in-memory for this session
  // rather than silently breaking every button that saves after acting.
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

// Reset "today" counters on a new day (history in dailyCounts is kept forever)
function checkDay() {
  const today = localDateStr();
  if (state.lastDate !== today) {
    state.doneToday = 0;
    state.lastDate = today;
    state.remindersFired = {};
    saveState();
  }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function getTask(id) { return state.tasks.find(t => t.id === id); }
function getCat(id) { return state.categories.find(c => c.id === id); }
function getCatColor(catId) { const c = getCat(catId); return c ? c.color : '#b09a88'; }
function getCatName(catId) { const c = getCat(catId); return c ? c.name : 'Uncategorised'; }
function getCatIcon(catId) { const c = getCat(catId); return c && c.icon ? c.icon : ''; }

// WCAG relative luminance -> pick whichever of white/dark text has better contrast
function relLuminance(hex) {
  hex = hex.replace('#', '');
  const toLin = (c) => { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
  const r = toLin(parseInt(hex.substr(0, 2), 16));
  const g = toLin(parseInt(hex.substr(2, 2), 16));
  const b = toLin(parseInt(hex.substr(4, 2), 16));
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function bestTextColor(hex) {
  const lum = relLuminance(hex);
  const contrastWhite = 1.05 / (lum + 0.05);
  const contrastDark = (lum + 0.05) / 0.05;
  return contrastWhite >= contrastDark ? '#ffffff' : '#2a2018';
}

function localDateStr(d) {
  d = d || new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function matchesEnergyFilter(task) {
  if (!task) return false;
  return state.energyFilter === 'any' || (task.energy || 'medium') === state.energyFilter;
}

function poolTasks() {
  // Tasks not currently on the wheel
  return state.tasks.filter(t => !state.wheel.includes(t.id));
}

function fillWheel() {
  // Make sure wheel array is length 8
  while (state.wheel.length < WHEEL_SLOTS) state.wheel.push(null);
  state.wheel = state.wheel.slice(0, WHEEL_SLOTS);

  // Work out which slots need filling, and how categories are already represented
  const emptySlots = [];
  const catCounts = {};
  state.wheel.forEach((taskId, i) => {
    const t = taskId ? getTask(taskId) : null;
    if (t) catCounts[t.catId] = (catCounts[t.catId] || 0) + 1;
    else emptySlots.push(i);
  });
  if (!emptySlots.length) { saveState(); return; }

  // Fill from pool, preferring the current energy filter, spread across categories
  const pool = poolTasks();
  const matching = shuffle(pool.filter(matchesEnergyFilter));
  const rest = shuffle(pool.filter(t => !matchesEnergyFilter(t)));
  const candidates = [...matching, ...rest];
  const picks = pickBalanced(candidates, emptySlots.length, catCounts);
  emptySlots.forEach((slotIndex, idx) => {
    state.wheel[slotIndex] = picks[idx] ? picks[idx].id : null;
  });

  saveState();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Greedily picks `count` tasks from `candidates`, always taking next from
// whichever category is currently least represented — spreads categories
// across the wheel instead of letting one clump up by chance.
function pickBalanced(candidates, count, initialCounts) {
  const pool = [...candidates];
  const counts = Object.assign({}, initialCounts);
  const picked = [];
  while (picked.length < count && pool.length) {
    let bestIdx = 0, bestCount = Infinity;
    for (let k = 0; k < pool.length; k++) {
      const c = counts[pool[k].catId] || 0;
      if (c < bestCount) { bestCount = c; bestIdx = k; if (c === 0) break; }
    }
    const [t] = pool.splice(bestIdx, 1);
    picked.push(t);
    counts[t.catId] = (counts[t.catId] || 0) + 1;
  }
  return picked;
}

function uid() { return 'id' + Date.now() + Math.random().toString(36).slice(2); }

function fmtTime(ms) {
  if (!ms) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), rem = s % 60;
  return m + 'm ' + (rem > 0 ? rem + 's' : '');
}

function avgTime(task) {
  if (!task.history || !task.history.length) return null;
  const timed = task.history.filter(h => h.duration > 0);
  if (!timed.length) return null;
  return timed.reduce((a, b) => a + b.duration, 0) / timed.length;
}

function computeStreak() {
  let streak = 0;
  let d = new Date();
  if (!(state.dailyCounts[localDateStr(d)] > 0)) {
    d.setDate(d.getDate() - 1); // today has no completions yet, streak is still "alive" until midnight
  }
  while (state.dailyCounts[localDateStr(d)] > 0) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ─────────────────────────────────────────────
//  WHEEL RENDERING
// ─────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function degToRad(d) { return d * Math.PI / 180; }

function polarToCart(r, angleDeg) {
  const rad = degToRad(angleDeg - 90); // start from top
  return [r * Math.cos(rad), r * Math.sin(rad)];
}

function segPath(index, total, outerR, innerR, gapDeg = 2) {
  const sliceDeg = 360 / total;
  const startDeg = index * sliceDeg + gapDeg / 2;
  const endDeg   = startDeg + sliceDeg - gapDeg;

  const [ox1, oy1] = polarToCart(outerR, startDeg);
  const [ox2, oy2] = polarToCart(outerR, endDeg);
  const [ix1, iy1] = polarToCart(innerR, endDeg);
  const [ix2, iy2] = polarToCart(innerR, startDeg);

  const largeArc = sliceDeg - gapDeg > 180 ? 1 : 0;

  return `M ${ox1} ${oy1}
    A ${outerR} ${outerR} 0 ${largeArc} 1 ${ox2} ${oy2}
    L ${ix1} ${iy1}
    A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix2} ${iy2}
    Z`;
}

function textOnSeg(index, total, text, color) {
  const sliceDeg = 360 / total;
  const midDeg = index * sliceDeg + sliceDeg / 2 - 90;
  const midR = (WHEEL_R + INNER_R) / 2;
  const rad = degToRad(midDeg);
  const cx = midR * Math.cos(rad);
  const cy = midR * Math.sin(rad);

  // max chars per line based on radial space
  const maxChars = 14;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    if ((cur + ' ' + w).trim().length <= maxChars) {
      cur = (cur + ' ' + w).trim();
    } else {
      if (cur) lines.push(cur);
      cur = w;
    }
  }
  if (cur) lines.push(cur);
  // max 3 lines, with an ellipsis if we had to cut text off
  const truncated = lines.length > 3;
  const displayLines = lines.slice(0, 3);
  if (truncated && displayLines.length) {
    let last = displayLines[displayLines.length - 1];
    if (last.length > 11) last = last.slice(0, 11);
    displayLines[displayLines.length - 1] = last + '…';
  }

  const lineH = 11;
  const totalH = displayLines.length * lineH;
  const startY = cy - totalH / 2 + lineH / 2;

  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${cx}, ${startY})`);
  g.setAttribute('class', 'seg-text');

  displayLines.forEach((line, li) => {
    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', '0');
    t.setAttribute('y', String(li * lineH));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('fill', color);
    t.setAttribute('font-size', '9.5');
    t.setAttribute('font-weight', '700');
    t.setAttribute('font-family', 'Nunito, sans-serif');
    t.textContent = line;
    g.appendChild(t);
  });

  return g;
}

function renderWheel() {
  checkDay();
  fillWheel();

  const svg = document.getElementById('wheelSvg');
  // remove all children except defs
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Outer ring decoration
  const outerCircle = document.createElementNS(SVG_NS, 'circle');
  outerCircle.setAttribute('cx', '0'); outerCircle.setAttribute('cy', '0');
  outerCircle.setAttribute('r', String(WHEEL_R + 6));
  outerCircle.setAttribute('fill', 'none');
  outerCircle.setAttribute('stroke', 'var(--border)');
  outerCircle.setAttribute('stroke-width', '2');
  svg.appendChild(outerCircle);

  // Inner ring decoration
  const innerCircle = document.createElementNS(SVG_NS, 'circle');
  innerCircle.setAttribute('cx', '0'); innerCircle.setAttribute('cy', '0');
  innerCircle.setAttribute('r', String(INNER_R - 4));
  innerCircle.setAttribute('fill', 'var(--panel)');
  innerCircle.setAttribute('stroke', 'var(--border)');
  innerCircle.setAttribute('stroke-width', '1.5');
  svg.appendChild(innerCircle);

  for (let i = 0; i < WHEEL_SLOTS; i++) {
    const taskId = state.wheel[i];
    const task = taskId ? getTask(taskId) : null;

    const segG = document.createElementNS(SVG_NS, 'g');
    segG.setAttribute('data-slot', String(i));
    segG.style.cursor = 'pointer';

    // Segment fill — solid, vivid colour per category (not a pale tint)
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', segPath(i, WHEEL_SLOTS, WHEEL_R, INNER_R));
    const color = task ? getCatColor(task.catId) : '#e8d8c4';
    const textColor = task ? bestTextColor(color) : 'var(--text3)';
    path.setAttribute('fill', task ? color : '#f5ede0');
    path.setAttribute('stroke', task ? '#fdf6ee' : 'var(--border)');
    path.setAttribute('stroke-width', task ? '2.5' : '1.5');
    path.style.transition = 'filter 0.15s';
    segG.appendChild(path);

    if (task) {
      // Task label
      const textG = textOnSeg(i, WHEEL_SLOTS, task.name, textColor);
      segG.appendChild(textG);

      // Category icon badge near the hub (colour isn't the only cue)
      const icon = getCatIcon(task.catId);
      if (icon) {
        const sliceDeg = 360 / WHEEL_SLOTS;
        const midDeg = i * sliceDeg + sliceDeg / 2 - 90;
        const iconR = INNER_R + 15;
        const rad = degToRad(midDeg);
        const ix = iconR * Math.cos(rad);
        const iy = iconR * Math.sin(rad);
        const iconText = document.createElementNS(SVG_NS, 'text');
        iconText.setAttribute('x', String(ix));
        iconText.setAttribute('y', String(iy));
        iconText.setAttribute('text-anchor', 'middle');
        iconText.setAttribute('dominant-baseline', 'middle');
        iconText.setAttribute('font-size', '11');
        iconText.setAttribute('class', 'seg-text');
        iconText.textContent = icon;
        segG.appendChild(iconText);
      }

      // Avg time hint (tiny, outer edge of seg)
      const avg = avgTime(task);
      if (avg) {
        const sliceDeg = 360 / WHEEL_SLOTS;
        const midDeg = i * sliceDeg + sliceDeg / 2 - 90;
        const hintR = WHEEL_R - 12;
        const rad = degToRad(midDeg);
        const hx = hintR * Math.cos(rad);
        const hy = hintR * Math.sin(rad);
        const hint = document.createElementNS(SVG_NS, 'text');
        hint.setAttribute('x', String(hx));
        hint.setAttribute('y', String(hy));
        hint.setAttribute('text-anchor', 'middle');
        hint.setAttribute('dominant-baseline', 'middle');
        hint.setAttribute('fill', textColor);
        hint.setAttribute('fill-opacity', '0.75');
        hint.setAttribute('font-size', '7.5');
        hint.setAttribute('font-weight', '700');
        hint.setAttribute('font-family', 'Nunito, sans-serif');
        hint.setAttribute('class', 'seg-text');
        hint.textContent = '~' + fmtTime(avg);
        segG.appendChild(hint);
      }

      // Accessibility: focusable, labelled, keyboard-activatable
      segG.setAttribute('tabindex', '0');
      segG.setAttribute('role', 'button');
      segG.setAttribute('aria-label', `${task.name}, ${getCatName(task.catId)} category, ${task.energy || 'medium'} energy. Press Enter to open.`);

      // Events
      segG.addEventListener('click', (e) => { e.stopPropagation(); handleSegClick(i); });
      segG.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleSegClick(i); }
      });
      segG.addEventListener('contextmenu', (e) => { e.preventDefault(); handleSegSwap(i); });

      // Long press for mobile swap
      let pressTimer;
      segG.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => { handleSegSwap(i); }, 500);
      }, { passive: true });
      segG.addEventListener('touchend', () => clearTimeout(pressTimer));
      segG.addEventListener('touchmove', () => clearTimeout(pressTimer));

      // Hover highlight
      segG.addEventListener('mouseenter', () => {
        path.style.filter = 'brightness(1.12)';
      });
      segG.addEventListener('mouseleave', () => {
        path.style.filter = '';
      });

    } else {
      // Empty slot — tap to fill from pool
      const emptyText = document.createElementNS(SVG_NS, 'text');
      const sliceDeg = 360 / WHEEL_SLOTS;
      const midDeg = i * sliceDeg + sliceDeg / 2 - 90;
      const midR = (WHEEL_R + INNER_R) / 2;
      const rad = degToRad(midDeg);
      emptyText.setAttribute('x', String(midR * Math.cos(rad)));
      emptyText.setAttribute('y', String(midR * Math.sin(rad)));
      emptyText.setAttribute('text-anchor', 'middle');
      emptyText.setAttribute('dominant-baseline', 'middle');
      emptyText.setAttribute('fill', 'var(--text3)');
      emptyText.setAttribute('font-size', '16');
      emptyText.textContent = '＋';
      segG.appendChild(emptyText);
      segG.setAttribute('tabindex', '0');
      segG.setAttribute('role', 'button');
      segG.setAttribute('aria-label', 'Empty slot, press Enter to add a task from the pool');
      segG.addEventListener('click', () => fillSlotFromPool(i));
      segG.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fillSlotFromPool(i); }
      });
    }

    svg.appendChild(segG);
  }

  // Update done count + streak
  const dc = document.getElementById('doneCount');
  const streak = computeStreak();
  dc.textContent = state.doneToday + ' done today' + (state.doneToday >= 8 ? ' 🎉' : '') + (streak > 1 ? ` · 🔥 ${streak}-day streak` : '');

  // Pool count
  const pool = poolTasks();
  document.getElementById('poolCount').textContent = pool.length + ' more in pool';

  // Energy pill active state
  document.querySelectorAll('.energy-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.energy === state.energyFilter);
  });

  // Size SVG for viewport
  sizeSvg();
}

function sizeSvg() {
  const vw = Math.min(window.innerWidth - 40, 460);
  const vh = window.innerHeight - 220;
  const size = Math.min(vw, vh, 460);
  const svg = document.getElementById('wheelSvg');
  svg.style.width = size + 'px';
  svg.style.height = size + 'px';
  // Centre button
  const cb = document.querySelector('.centre-btn');
  const btnSize = Math.max(60, size * 0.17);
  cb.style.width = btnSize + 'px';
  cb.style.height = btnSize + 'px';
}

window.addEventListener('resize', () => { sizeSvg(); });

// ─────────────────────────────────────────────
//  SPIN — the "just pick for me" action
// ─────────────────────────────────────────────
function spinWheel() {
  if (spinning) return;
  const filledSlots = state.wheel.map((id, i) => ({ id, i })).filter(s => s.id);
  if (!filledSlots.length) { toast('Wheel is empty — add tasks in settings ⚙️'); return; }

  let candidates = filledSlots.filter(s => matchesEnergyFilter(getTask(s.id)));
  if (!candidates.length) candidates = filledSlots;
  const target = candidates[Math.floor(Math.random() * candidates.length)];
  const targetTask = getTask(target.id);
  if (!targetTask) return;

  spinning = true;
  const centreBtn = document.getElementById('centreBtn');
  centreBtn.style.pointerEvents = 'none';
  document.getElementById('centreLabel').textContent = '…';

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sliceDeg = 360 / WHEEL_SLOTS;
  const targetCenter = target.i * sliceDeg + sliceDeg / 2;
  const extraSpins = reducedMotion ? 0 : (4 + Math.floor(Math.random() * 3));
  const baseRotation = currentRotation - (currentRotation % 360);
  const finalRotation = baseRotation + extraSpins * 360 - targetCenter;
  const duration = reducedMotion ? 0 : 3200;

  const svg = document.getElementById('wheelSvg');
  svg.style.transition = duration ? `transform ${duration}ms cubic-bezier(0.12,0.67,0.15,1)` : 'none';
  svg.style.transform = `rotate(${finalRotation}deg)`;
  currentRotation = finalRotation;

  setTimeout(() => {
    spinning = false;
    centreBtn.style.pointerEvents = '';
    document.getElementById('centreLabel').textContent = 'Spin';
    openTaskDetail(target.id, target.i);
  }, duration + 80);
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function handleSegClick(slotIndex) {
  if (spinning) return;
  const taskId = state.wheel[slotIndex];
  if (!taskId) return;
  openTaskDetail(taskId, slotIndex);
}

function handleSegSwap(slotIndex) {
  if (spinning) return;
  const taskId = state.wheel[slotIndex];
  const pool = poolTasks();
  if (!pool.length) { toast('No more tasks in the pool! Add some in settings ⚙️'); return; }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.wheel[slotIndex] = pick.id;
  saveState();
  renderWheel();
  toast('Swapped for: ' + pick.name.slice(0, 30) + (pick.name.length > 30 ? '…' : ''));
}

function fillSlotFromPool(slotIndex) {
  if (spinning) return;
  const pool = poolTasks();
  if (!pool.length) { toast('Pool empty — add tasks in settings ⚙️'); return; }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.wheel[slotIndex] = pick.id;
  saveState();
  renderWheel();
}

function markDone(slotIndex, taskId, duration) {
  const task = getTask(taskId);
  if (!task) return;
  if (!task.history) task.history = [];
  task.history.push({
    date: new Date().toISOString(),
    duration: duration || 0,
  });
  // Keep last 20 completions
  if (task.history.length > 20) task.history = task.history.slice(-20);

  const today = localDateStr();
  state.dailyCounts[today] = (state.dailyCounts[today] || 0) + 1;
  lastDoneAction = { slotIndex, taskId, dateKey: today };

  state.wheel[slotIndex] = null;
  state.doneToday = (state.doneToday || 0) + 1;
  saveState();
  renderWheel();
  toast('✅ Done! Great work 🌟', { actionLabel: 'Undo', onAction: undoLastDone });
}

function undoLastDone() {
  if (!lastDoneAction) return;
  const { slotIndex, taskId, dateKey } = lastDoneAction;
  const task = getTask(taskId);
  if (task && task.history && task.history.length) task.history.pop();
  if (state.dailyCounts[dateKey]) {
    state.dailyCounts[dateKey]--;
    if (state.dailyCounts[dateKey] <= 0) delete state.dailyCounts[dateKey];
  }
  state.doneToday = Math.max(0, (state.doneToday || 0) - 1);
  // Overwrite whatever auto-filled this slot since markDone — that task simply returns to the pool
  state.wheel[slotIndex] = taskId;
  lastDoneAction = null;
  saveState();
  renderWheel();
  toast('↩️ Undone');
}

document.getElementById('shuffleAllBtn').addEventListener('click', () => {
  const picks = pickBalanced(shuffle([...state.tasks]), WHEEL_SLOTS, {});
  state.wheel = picks.map(t => t.id);
  saveState();
  renderWheel();
  toast('🔀 Wheel shuffled!');
});

document.getElementById('centreBtn').addEventListener('click', spinWheel);

document.querySelectorAll('.energy-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    state.energyFilter = btn.dataset.energy;
    applyEnergyFilter();
  });
});

function applyEnergyFilter() {
  const matching = shuffle(state.tasks.filter(matchesEnergyFilter));
  const rest = shuffle(state.tasks.filter(t => !matchesEnergyFilter(t)));
  const combined = [...matching, ...rest];
  const picks = pickBalanced(combined, WHEEL_SLOTS, {});
  state.wheel = picks.map(t => t.id);
  saveState();
  renderWheel();
  toast(state.energyFilter === 'any' ? '✨ Showing any energy level' : 'Showing more ' + state.energyFilter + '-energy tasks');
}

// ─────────────────────────────────────────────
//  TASK DETAIL MODAL (+ persistent timer)
// ─────────────────────────────────────────────
let activeDetailSlot = null;
let activeDetailTask = null;
let detailTimerInterval = null;

function getTimerState(taskId) {
  if (!state.activeTimers[taskId]) {
    state.activeTimers[taskId] = { startTs: null, accumMs: 0, running: false };
  }
  return state.activeTimers[taskId];
}

function currentTimerMs(t) {
  return t.accumMs + (t.running && t.startTs ? Date.now() - t.startTs : 0);
}

function openTaskDetail(taskId, slotIndex) {
  activeDetailSlot = slotIndex;
  activeDetailTask = getTask(taskId);
  if (!activeDetailTask) return;

  clearInterval(detailTimerInterval);
  renderDetailContent();
  if (getTimerState(taskId).running) {
    detailTimerInterval = setInterval(updateDetailTimerDisplay, 500);
  }
  document.getElementById('detailOverlay').classList.add('open');
}

function renderDetailContent() {
  const task = activeDetailTask;
  const cat = getCat(task.catId);
  const color = getCatColor(task.catId);
  const avg = avgTime(task);
  const completions = (task.history || []).length;
  const lastDone = task.history && task.history.length
    ? new Date(task.history[task.history.length - 1].date).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })
    : 'Never';

  const t = getTimerState(task.id);
  const ms = currentTimerMs(t);
  const mins = String(Math.floor(ms / 60000)).padStart(2, '0');
  const secs = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');

  const energyLabel = { low: '🪫 Low energy', medium: '⚡ Medium energy', high: '🔥 High energy' }[task.energy || 'medium'];

  document.getElementById('detailContent').innerHTML = `
    <div class="task-detail-name">${task.name}</div>
    <span class="task-detail-cat" style="background:${color}22;color:${color}">
      ${getCatIcon(task.catId)} ${getCatName(task.catId)}
    </span>
    <div class="modal-sub" style="margin-top:-8px">${energyLabel}</div>

    <div class="task-history-row">
      <span class="task-history-label">✅ Times done</span>
      <span class="task-history-val">${completions}</span>
    </div>
    <div class="task-history-row">
      <span class="task-history-label">⏱ Avg time</span>
      <span class="task-history-val">${avg ? fmtTime(avg) : '—'}</span>
    </div>
    <div class="task-history-row">
      <span class="task-history-label">📅 Last done</span>
      <span class="task-history-val">${lastDone}</span>
    </div>

    <div class="mini-timer">
      <div class="mini-timer-label">Task timer${t.running ? ' (running)' : ''}</div>
      <div class="mini-timer-time" id="detailTimerDisplay">${mins}:${secs}</div>
      <div class="timer-btns" style="margin-top:12px">
        <button class="tbtn primary" id="timerToggleBtn">${t.running ? '⏸ Pause' : '▶ Start'}</button>
        <button class="tbtn" id="timerResetBtn">↺ Reset</button>
        <button class="tbtn done-btn" id="markDoneBtn">✅ Done!</button>
      </div>
    </div>
    <div class="detail-note">The timer keeps running even if you close this window — open it again any time to check on it.</div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:center;">
      <button class="tbtn" id="swapDetailBtn" style="font-size:0.75rem">🔀 Swap task</button>
    </div>
  `;

  document.getElementById('timerToggleBtn').addEventListener('click', toggleDetailTimer);
  document.getElementById('timerResetBtn').addEventListener('click', resetDetailTimer);
  document.getElementById('markDoneBtn').addEventListener('click', () => {
    const tm = getTimerState(activeDetailTask.id);
    const dur = currentTimerMs(tm);
    clearInterval(detailTimerInterval);
    delete state.activeTimers[activeDetailTask.id];
    const slot = activeDetailSlot, id = activeDetailTask.id;
    closeDetailModal();
    markDone(slot, id, dur);
  });
  document.getElementById('swapDetailBtn').addEventListener('click', () => {
    const slot = activeDetailSlot;
    closeDetailModal();
    handleSegSwap(slot);
  });
}

function toggleDetailTimer() {
  const t = getTimerState(activeDetailTask.id);
  if (t.running) {
    t.accumMs += Date.now() - t.startTs;
    t.startTs = null;
    t.running = false;
    clearInterval(detailTimerInterval);
  } else {
    t.startTs = Date.now();
    t.running = true;
    detailTimerInterval = setInterval(updateDetailTimerDisplay, 500);
  }
  saveState();
  const btn = document.getElementById('timerToggleBtn');
  if (btn) btn.textContent = t.running ? '⏸ Pause' : '▶ Start';
}

function resetDetailTimer() {
  const t = getTimerState(activeDetailTask.id);
  clearInterval(detailTimerInterval);
  t.running = false;
  t.startTs = null;
  t.accumMs = 0;
  saveState();
  updateDetailTimerDisplay();
  const btn = document.getElementById('timerToggleBtn');
  if (btn) btn.textContent = '▶ Start';
}

function updateDetailTimerDisplay() {
  const el = document.getElementById('detailTimerDisplay');
  if (!el || !activeDetailTask) return;
  const ms = currentTimerMs(getTimerState(activeDetailTask.id));
  const mins = String(Math.floor(ms / 60000)).padStart(2, '0');
  const secs = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
  el.textContent = `${mins}:${secs}`;
}

function closeDetailModal() {
  // Only stops refreshing the display — an already-running timer keeps counting in state
  clearInterval(detailTimerInterval);
  document.getElementById('detailOverlay').classList.remove('open');
}

document.getElementById('detailClose').addEventListener('click', closeDetailModal);
document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detailOverlay')) closeDetailModal();
});

// ─────────────────────────────────────────────
//  STATS MODAL
// ─────────────────────────────────────────────
document.getElementById('statsBtn').addEventListener('click', () => {
  renderStatsContent();
  document.getElementById('statsOverlay').classList.add('open');
});
document.getElementById('statsClose').addEventListener('click', () => {
  document.getElementById('statsOverlay').classList.remove('open');
});
document.getElementById('statsOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('statsOverlay')) document.getElementById('statsOverlay').classList.remove('open');
});

function renderStatsContent() {
  const streak = computeStreak();
  const totalAll = Object.values(state.dailyCounts).reduce((a, b) => a + b, 0);
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = localDateStr(d);
    days.push({ label: d.toLocaleDateString('en-GB', { weekday: 'narrow' }), count: state.dailyCounts[key] || 0 });
  }
  const maxCount = Math.max(1, ...days.map(d => d.count));
  const bars = days.map(d => `
    <div class="stat-bar-col">
      <div class="stat-bar" style="height:${Math.round((d.count / maxCount) * 60) || 4}px" title="${d.count} done"></div>
      <div class="stat-bar-label">${d.label}</div>
    </div>
  `).join('');

  document.getElementById('statsContent').innerHTML = `
    <div class="modal-title">Your progress</div>
    <div class="modal-sub">Keep going — every task counts 🌟</div>
    <div class="task-history-row"><span class="task-history-label">🔥 Current streak</span><span class="task-history-val">${streak} day${streak === 1 ? '' : 's'}</span></div>
    <div class="task-history-row"><span class="task-history-label">✅ Done today</span><span class="task-history-val">${state.doneToday}</span></div>
    <div class="task-history-row"><span class="task-history-label">🌟 All-time total</span><span class="task-history-val">${totalAll}</span></div>
    <div class="modal-sub" style="margin-top:14px;margin-bottom:0">Last 7 days</div>
    <div class="stat-bars">${bars}</div>
  `;
}

// ─────────────────────────────────────────────
//  REMINDERS MODAL
// ─────────────────────────────────────────────
document.getElementById('remindersBtn').addEventListener('click', () => {
  renderRemindersContent();
  document.getElementById('remindersOverlay').classList.add('open');
});
document.getElementById('remindersClose').addEventListener('click', () => {
  document.getElementById('remindersOverlay').classList.remove('open');
});
document.getElementById('remindersOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('remindersOverlay')) document.getElementById('remindersOverlay').classList.remove('open');
});

function renderRemindersContent() {
  const supported = typeof Notification !== 'undefined';
  const permission = supported ? Notification.permission : 'unsupported';
  const list = state.reminders.map(t => `
    <div class="task-history-row">
      <span class="task-history-label">⏰ ${t}</span>
      <button class="task-del-btn" data-time="${t}" aria-label="Remove reminder at ${t}">✕</button>
    </div>
  `).join('') || '<div class="empty-msg">No reminders set yet.</div>';

  document.getElementById('remindersContent').innerHTML = `
    <div class="modal-title">Reminders</div>
    <div class="modal-sub">NeuroWheel+ can nudge you while this tab (or installed app) is open. Browser reminders aren't as reliable as a phone alarm, so pair this with your phone's clock for anything important.</div>
    ${supported && permission !== 'granted' ? `<button class="tbtn primary" id="enableNotifBtn" style="margin-bottom:14px;width:100%">🔔 Enable notifications</button>` : ''}
    <div id="reminderList">${list}</div>
    <div class="add-task-row">
      <input type="time" class="add-input" id="newReminderInput">
      <button class="add-submit" id="addReminderBtn">Add</button>
    </div>
  `;

  const enableBtn = document.getElementById('enableNotifBtn');
  if (enableBtn) {
    enableBtn.addEventListener('click', async () => {
      try { await Notification.requestPermission(); } catch (e) {}
      renderRemindersContent();
    });
  }
  document.getElementById('addReminderBtn').addEventListener('click', () => {
    const inp = document.getElementById('newReminderInput');
    if (!inp.value) return;
    if (!state.reminders.includes(inp.value)) {
      state.reminders.push(inp.value);
      state.reminders.sort();
      saveState();
    }
    inp.value = '';
    renderRemindersContent();
  });
  document.querySelectorAll('#reminderList .task-del-btn').forEach(b => {
    b.addEventListener('click', () => {
      state.reminders = state.reminders.filter(t => t !== b.dataset.time);
      saveState();
      renderRemindersContent();
    });
  });
}

function fireReminder() {
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    try { new Notification('NeuroWheel+ 🎡', { body: "Time to spin! What's next?" }); return; } catch (e) {}
  }
  toast('⏰ Reminder: time to spin your wheel!');
}

function checkReminders() {
  if (!state.reminders.length) return;
  const now = new Date();
  const cur = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  const today = localDateStr(now);
  let changed = false;
  state.reminders.forEach(t => {
    if (t === cur) {
      const key = t + '_' + today;
      if (!state.remindersFired[key]) {
        state.remindersFired[key] = true;
        changed = true;
        fireReminder();
      }
    }
  });
  if (changed) saveState();
}

setInterval(checkReminders, 20000);

// ─────────────────────────────────────────────
//  EXPORT / IMPORT
// ─────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `neurowheel-backup-${localDateStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('⬇️ Backup downloaded');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed || !Array.isArray(parsed.tasks) || !Array.isArray(parsed.categories)) throw new Error('bad format');
      if (!confirm('Import will replace your current tasks, categories and history. Continue?')) return;
      state = migrateState(parsed);
      saveState();
      fillWheel();
      renderSetup();
      renderWheel();
      toast('✅ Data imported!');
    } catch (err) {
      toast('⚠️ Could not read that backup file');
    }
  };
  reader.readAsText(file);
});

// ─────────────────────────────────────────────
//  SETUP SCREEN
// ─────────────────────────────────────────────
document.getElementById('setupBtn').addEventListener('click', () => {
  showScreen('setupScreen');
  renderSetup();
});
document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  fillWheel();
  showScreen('wheelScreen');
  renderWheel();
});
document.getElementById('saveSetupBtn').addEventListener('click', () => {
  saveState();
  fillWheel();
  showScreen('wheelScreen');
  renderWheel();
  toast('✅ Saved! Wheel updated.');
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderSetup() {
  renderCatList();
  renderTaskPool();
}

function renderCatList() {
  const el = document.getElementById('catList');
  el.innerHTML = '';
  state.categories.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <div class="cat-color-swatch" style="background:${cat.color}" title="Click to change colour" data-catid="${cat.id}"></div>
      <input type="color" class="color-pick" data-catid="${cat.id}" value="${cat.color}">
      <input class="cat-icon-input" value="${cat.icon || ''}" data-catid="${cat.id}" maxlength="2" title="Icon" aria-label="Icon for ${cat.name}">
      <input class="cat-name-input" value="${cat.name}" data-catid="${cat.id}" maxlength="24">
      <button class="cat-del" data-catid="${cat.id}" title="Delete category" aria-label="Delete category ${cat.name}">🗑</button>
    `;
    const swatch = row.querySelector('.cat-color-swatch');
    const picker = row.querySelector('.color-pick');
    swatch.addEventListener('click', () => picker.click());
    picker.addEventListener('input', (e) => {
      cat.color = e.target.value;
      swatch.style.background = cat.color;
      saveState();
    });
    row.querySelector('.cat-icon-input').addEventListener('input', (e) => {
      cat.icon = e.target.value;
      saveState();
    });
    row.querySelector('.cat-name-input').addEventListener('input', (e) => {
      cat.name = e.target.value;
    });
    row.querySelector('.cat-del').addEventListener('click', () => {
      if (state.categories.length <= 1) { toast('Need at least one category!'); return; }
      // Reassign tasks with this cat
      state.tasks.forEach(t => { if (t.catId === cat.id) t.catId = state.categories[0].id; });
      state.categories = state.categories.filter(c => c.id !== cat.id);
      saveState();
      renderCatList();
      renderTaskPool();
    });
    el.appendChild(row);
  });
}

document.getElementById('addCatBtn').addEventListener('click', () => {
  const inp = document.getElementById('newCatInput');
  const name = inp.value.trim();
  if (!name) return;
  const colors = ['#a855f7','#ef4444','#14b8a6','#06b6d4','#f43f5e'];
  const color = colors[state.categories.length % colors.length];
  state.categories.push({ id: uid(), name, color, icon: '⭐' });
  inp.value = '';
  saveState();
  renderCatList();
  renderTaskPool();
});

function renderTaskPool() {
  const el = document.getElementById('taskPoolList');
  el.innerHTML = '';

  if (!state.tasks.length) {
    el.innerHTML = '<div class="empty-msg">No tasks yet. Add some below! ✨</div>';
    return;
  }

  state.tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-list-item';

    const color = getCatColor(task.catId);
    const catOptions = state.categories.map(c =>
      `<option value="${c.id}"${c.id === task.catId ? ' selected' : ''}>${c.icon || ''} ${c.name}</option>`
    ).join('');
    const energy = task.energy || 'medium';
    const energyOptions = [
      ['low', '🪫 Low'],
      ['medium', '⚡ Med'],
      ['high', '🔥 High'],
    ].map(([val, label]) => `<option value="${val}"${val === energy ? ' selected' : ''}>${label}</option>`).join('');

    item.innerHTML = `
      <div class="task-list-dot" style="background:${color}" data-tid="${task.id}" title="Colour = category"></div>
      <input class="task-list-name" value="${task.name}" data-tid="${task.id}" maxlength="60">
      <select class="task-cat-select" data-tid="${task.id}" style="color:${color}; border-color:${color}40" aria-label="Category for ${task.name}">
        ${catOptions}
      </select>
      <select class="task-cat-select task-energy-select" data-tid="${task.id}" aria-label="Energy level for ${task.name}">
        ${energyOptions}
      </select>
      <button class="task-del-btn" data-tid="${task.id}" title="Remove task" aria-label="Remove ${task.name}">✕</button>
    `;

    item.querySelector('.task-list-name').addEventListener('input', (e) => {
      task.name = e.target.value;
    });
    item.querySelector('.task-cat-select').addEventListener('change', (e) => {
      task.catId = e.target.value;
      const newColor = getCatColor(task.catId);
      item.querySelector('.task-list-dot').style.background = newColor;
      e.target.style.color = newColor;
    });
    item.querySelector('.task-energy-select').addEventListener('change', (e) => {
      task.energy = e.target.value;
    });
    item.querySelector('.task-del-btn').addEventListener('click', () => {
      // remove from wheel too
      state.wheel = state.wheel.map(id => id === task.id ? null : id);
      state.tasks = state.tasks.filter(t => t.id !== task.id);
      delete state.activeTimers[task.id];
      saveState();
      renderTaskPool();
    });

    el.appendChild(item);
  });
}

document.getElementById('addTaskBtn').addEventListener('click', addNewTask);
document.getElementById('newTaskInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addNewTask();
});

function addNewTask() {
  const inp = document.getElementById('newTaskInput');
  const name = inp.value.trim();
  if (!name) return;
  const catId = state.categories.length ? state.categories[0].id : null;
  state.tasks.push({ id: uid(), name, catId, energy: 'medium', history: [] });
  inp.value = '';
  saveState();
  renderTaskPool();
  toast('Task added to pool ✨');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, opts) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  const actionBtn = document.getElementById('toastAction');
  if (opts && opts.actionLabel) {
    actionBtn.textContent = opts.actionLabel;
    actionBtn.style.display = 'inline-block';
    actionBtn.onclick = () => {
      opts.onAction();
      el.classList.remove('show');
      clearTimeout(toastTimer);
    };
  } else {
    actionBtn.style.display = 'none';
    actionBtn.onclick = null;
  }
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), opts && opts.actionLabel ? 5000 : 2400);
}

// ─────────────────────────────────────────────
//  PWA — installable, works offline once cached
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator && (location.protocol === 'http:' || location.protocol === 'https:')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
checkDay();
fillWheel();
renderWheel();
</script>
