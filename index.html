<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NeuroWheel ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee;
  --panel: #fffaf4;
  --border: #e8d8c4;
  --text: #3d2f22;
  --text2: #7a6555;
  --text3: #b09a88;
  --accent: #e07a3a;
  --shadow: 0 4px 24px rgba(61,47,34,0.13);
  --radius: 20px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  font-size: 14px;
  user-select: none;
}

/* ── SCREENS ── */
.screen { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

/* ── WHEEL SCREEN ── */
#wheelScreen {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 50%, #f9f0e3 0%, var(--bg) 70%);
}

.wheel-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 0;
  z-index: 10;
}
.logo-small {
  font-family: 'Lora', serif;
  font-size: 1rem;
  color: var(--accent);
  font-style: italic;
}
.header-btns { display: flex; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: var(--shadow);
  transition: transform 0.15s, background 0.15s;
}
.icon-btn:hover, .icon-btn:active { transform: scale(0.93); background: var(--border); }

.wheel-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

#wheelSvg {
  filter: drop-shadow(0 8px 32px rgba(61,47,34,0.18));
  transition: transform 0.3s ease;
}

/* Centre circle button */
.centre-btn {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--panel);
  border: 3px solid var(--border);
  box-shadow: 0 2px 16px rgba(61,47,34,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  gap: 2px;
  transition: transform 0.15s, background 0.15s;
  z-index: 5;
}
.centre-btn:hover, .centre-btn:active { transform: scale(0.92); background: var(--bg); }
.centre-icon { font-size: 1.4rem; }

.done-count {
  position: absolute;
  bottom: -44px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text3);
  white-space: nowrap;
  background: var(--panel);
  border: 1.5px solid var(--border);
  padding: 5px 14px;
  border-radius: 30px;
}

.pool-count {
  position: absolute;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.68rem;
  color: var(--text3);
  white-space: nowrap;
}

/* ── SEGMENT LABEL ── */
.seg-text {
  pointer-events: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #fdf6ee;
  padding: 9px 22px;
  border-radius: 30px;
  font-size: 0.78rem;
  font-weight: 700;
  opacity: 0;
  transition: all 0.28s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

/* ── MODALS ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,47,34,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.overlay.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--panel);
  border-radius: 24px;
  padding: 24px 22px;
  width: min(92vw, 420px);
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 12px 48px rgba(61,47,34,0.25);
  animation: modalIn 0.22s ease;
  position: relative;
}
@keyframes modalIn { from{transform:scale(0.93) translateY(10px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

.modal-title {
  font-family: 'Lora', serif;
  font-size: 1.15rem;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-sub { font-size: 0.78rem; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }

.modal-close {
  position: absolute;
  top: 18px; right: 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--border); }

/* Task detail modal */
.task-detail-name {
  font-family: 'Lora', serif;
  font-size: 1.3rem;
  line-height: 1.4;
  margin-bottom: 6px;
}
.task-detail-cat {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}
.task-history-row {
  background: var(--bg);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.task-history-label { font-size: 0.78rem; color: var(--text2); font-weight: 600; }
.task-history-val { font-size: 0.88rem; font-weight: 800; color: var(--text); }

/* Timer in detail */
.mini-timer {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  margin-top: 14px;
}
.mini-timer-time {
  font-family: 'Lora', serif;
  font-size: 2.6rem;
  letter-spacing: 2px;
  color: var(--text);
}
.mini-timer-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 14px;
}
.timer-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.tbtn {
  padding: 8px 18px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tbtn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.tbtn.done-btn { background: #5ab88a; color: white; border-color: #5ab88a; }
.tbtn:hover { opacity: 0.85; }

.detail-note {
  margin-top: 14px;
  font-size: 0.8rem;
  color: var(--text2);
  background: var(--bg);
  border-radius: 12px;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  line-height: 1.65;
}

/* ── SETUP SCREEN ── */
#setupScreen {
  background: var(--bg);
  overflow-y: auto;
  align-items: stretch;
  justify-content: flex-start;
}
.setup-wrap {
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.setup-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.setup-title {
  font-family: 'Lora', serif;
  font-size: 1.4rem;
  color: var(--text);
}
.back-btn {
  padding: 8px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--panel);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
}
.back-btn:hover { background: var(--border); }

.setup-section {
  background: var(--panel);
  border-radius: 20px;
  padding: 20px;
  border: 1.5px solid var(--border);
  margin-bottom: 18px;
}
.setup-section-title {
  font-weight: 800;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text3);
  margin-bottom: 14px;
}

/* Task list in setup */
.task-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.task-list-item:last-child { border-bottom: none; }
.task-list-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  border: 2px solid rgba(0,0,0,0.15);
}
.task-list-name {
  flex: 1;
  font-size: 0.87rem;
  font-weight: 600;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Nunito', sans-serif;
  padding: 2px 0;
}
.task-list-name:focus {
  border-bottom: 1.5px solid var(--accent);
}
.task-cat-select {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  outline: none;
  color: var(--text);
}
.task-del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 1rem;
  padding: 2px 4px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.task-del-btn:hover { color: #c04040; background: #fde8e8; }

.add-task-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.add-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.add-input:focus { border-color: var(--accent); }
.add-submit {
  padding: 9px 16px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.add-submit:hover { opacity: 0.85; }

/* Category config */
.cat-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.cat-row:last-child { border-bottom: none; }
.cat-color-swatch {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid rgba(0,0,0,0.1);
  cursor: pointer;
  flex-shrink: 0;
}
.cat-name-input {
  flex: 1;
  font-size: 0.87rem;
  font-weight: 600;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  padding: 2px 0;
}
.cat-name-input:focus { border-bottom: 1.5px solid var(--accent); }
.cat-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:1rem; }
.cat-del:hover { color: #c04040; }

/* Colour picker hidden input */
.color-pick { position:absolute; opacity:0; width:0; height:0; }

/* Save button */
.save-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.02em;
  transition: opacity 0.15s, transform 0.1s;
}
.save-btn:hover { opacity: 0.88; transform: scale(0.99); }

/* ── SEGMENT TICK ANIMATION ── */
@keyframes segDone {
  0%   { opacity: 1; transform: scale(1); }
  40%  { opacity: 1; transform: scale(1.06); }
  100% { opacity: 0; transform: scale(0.85); }
}
@keyframes segIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}
.seg-anim-done { animation: segDone 0.45s ease forwards; }
.seg-anim-in   { animation: segIn 0.35s ease forwards; }

/* ── EMPTY STATE ── */
.empty-msg {
  text-align: center;
  padding: 32px 20px;
  font-size: 0.85rem;
  color: var(--text3);
  line-height: 1.7;
}

/* ── SCROLL ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE WHEEL SIZE ── */
@media (max-height: 700px) {
  .wheel-wrap { transform: scale(0.85); }
}
@media (max-height: 560px) {
  .wheel-wrap { transform: scale(0.7); }
}
</style>
</head>
<body>

<!-- WHEEL SCREEN -->
<div class="screen active" id="wheelScreen">
  <div class="wheel-header">
    <div class="logo-small">NeuroWheel ✨</div>
    <div class="header-btns">
      <button class="icon-btn" id="shuffleAllBtn" title="Shuffle all 8 tasks">🔀</button>
      <button class="icon-btn" id="setupBtn" title="Edit task list">⚙️</button>
    </div>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <svg id="wheelSvg" viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
    <button class="centre-btn" id="centreBtn">
      <span class="centre-icon">🌿</span>
      <span id="centreLabel">Today</span>
    </button>
  </div>

  <div class="done-count" id="doneCount">0 done today</div>
  <div class="pool-count" id="poolCount"></div>
</div>

<!-- SETUP SCREEN -->
<div class="screen" id="setupScreen">
  <div class="setup-wrap">
    <div class="setup-header">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="setup-title">Task List & Categories</div>
    </div>

    <!-- Categories -->
    <div class="setup-section">
      <div class="setup-section-title">Categories & Colours</div>
      <div id="catList"></div>
      <div class="add-task-row" style="margin-top:12px">
        <input class="add-input" id="newCatInput" placeholder="New category name…" maxlength="24">
        <button class="add-submit" id="addCatBtn">Add</button>
      </div>
    </div>

    <!-- Task pool -->
    <div class="setup-section">
      <div class="setup-section-title">Master Task Pool</div>
      <div id="taskPoolList"></div>
      <div class="add-task-row">
        <input class="add-input" id="newTaskInput" placeholder="Add a task to the pool…" maxlength="60">
        <button class="add-submit" id="addTaskBtn">Add</button>
      </div>
    </div>

    <button class="save-btn" id="saveSetupBtn">✅ Save & go back to my wheel</button>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal">
    <button class="modal-close" id="detailClose">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE & DEFAULTS
// ─────────────────────────────────────────────
const WHEEL_SLOTS = 8;
const WHEEL_R = 170;
const INNER_R = 68;

let state = loadState();

function defaultState() {
  return {
    categories: [
      { id: 'c1', name: 'Quick win',   color: '#5ab88a' },
      { id: 'c2', name: 'Brain work',  color: '#4a9abf' },
      { id: 'c3', name: 'Admin',       color: '#e07a3a' },
      { id: 'c4', name: 'Self-care',   color: '#e8a0c0' },
      { id: 'c5', name: 'Home',        color: '#c9a84c' },
    ],
    tasks: [
      { id:'t1', name:'Make a cup of tea ☕', catId:'c1', history:[] },
      { id:'t2', name:'Check messages 📱', catId:'c3', history:[] },
      { id:'t3', name:'5-min tidy up 🧹', catId:'c5', history:[] },
      { id:'t4', name:'Drink a glass of water 💧', catId:'c4', history:[] },
      { id:'t5', name:'Open & sort post ✉️', catId:'c3', history:[] },
      { id:'t6', name:'Write three things to do 📝', catId:'c2', history:[] },
      { id:'t7', name:'10 min walk outside 🚶', catId:'c4', history:[] },
      { id:'t8', name:'Reply to one email ✉️', catId:'c3', history:[] },
      { id:'t9', name:'Quick stretch 🧘', catId:'c4', history:[] },
      { id:'t10', name:'Plan tomorrow morning 📅', catId:'c2', history:[] },
      { id:'t11', name:'Clear one surface 🗂️', catId:'c5', history:[] },
      { id:'t12', name:'Read for 10 minutes 📖', catId:'c1', history:[] },
    ],
    wheel: [], // array of task IDs currently in the 8 slots (null = empty)
    doneToday: 0,
    lastDate: '',
  };
}

function loadState() {
  try {
    const s = localStorage.getItem('neurowheel_v1');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('neurowheel_v1', JSON.stringify(state));
}

// Reset done count each new day
function checkDay() {
  const today = new Date().toDateString();
  if (state.lastDate !== today) {
    state.doneToday = 0;
    state.lastDate = today;
    saveState();
  }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function getTask(id) { return state.tasks.find(t => t.id === id); }
function getCat(id) { return state.categories.find(c => c.id === id); }
function getCatColor(catId) { const c = getCat(catId); return c ? c.color : '#b09a88'; }
function getCatName(catId) { const c = getCat(catId); return c ? c.name : 'Uncategorised'; }

function poolTasks() {
  // Tasks not currently on the wheel
  return state.tasks.filter(t => !state.wheel.includes(t.id));
}

function fillWheel() {
  // Make sure wheel array is length 8
  while (state.wheel.length < WHEEL_SLOTS) state.wheel.push(null);
  state.wheel = state.wheel.slice(0, WHEEL_SLOTS);
  // Fill null slots from pool
  const pool = shuffle(poolTasks());
  for (let i = 0; i < WHEEL_SLOTS; i++) {
    if (!state.wheel[i] || !getTask(state.wheel[i])) {
      const next = pool.shift();
      state.wheel[i] = next ? next.id : null;
    }
  }
  saveState();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function uid() { return 'id' + Date.now() + Math.random().toString(36).slice(2); }

function fmtTime(ms) {
  if (!ms) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), rem = s % 60;
  return m + 'm ' + (rem > 0 ? rem + 's' : '');
}

function avgTime(task) {
  if (!task.history || !task.history.length) return null;
  const timed = task.history.filter(h => h.duration > 0);
  if (!timed.length) return null;
  return timed.reduce((a, b) => a + b.duration, 0) / timed.length;
}

// ─────────────────────────────────────────────
//  WHEEL RENDERING
// ─────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function degToRad(d) { return d * Math.PI / 180; }

function polarToCart(r, angleDeg) {
  const rad = degToRad(angleDeg - 90); // start from top
  return [r * Math.cos(rad), r * Math.sin(rad)];
}

function segPath(index, total, outerR, innerR, gapDeg = 2) {
  const sliceDeg = 360 / total;
  const startDeg = index * sliceDeg + gapDeg / 2;
  const endDeg   = startDeg + sliceDeg - gapDeg;

  const [ox1, oy1] = polarToCart(outerR, startDeg);
  const [ox2, oy2] = polarToCart(outerR, endDeg);
  const [ix1, iy1] = polarToCart(innerR, endDeg);
  const [ix2, iy2] = polarToCart(innerR, startDeg);

  const largeArc = sliceDeg - gapDeg > 180 ? 1 : 0;

  return `M ${ox1} ${oy1}
    A ${outerR} ${outerR} 0 ${largeArc} 1 ${ox2} ${oy2}
    L ${ix1} ${iy1}
    A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix2} ${iy2}
    Z`;
}

function textOnSeg(index, total, text, color) {
  const sliceDeg = 360 / total;
  const midDeg = index * sliceDeg + sliceDeg / 2 - 90;
  const midR = (WHEEL_R + INNER_R) / 2;
  const rad = degToRad(midDeg);
  const cx = midR * Math.cos(rad);
  const cy = midR * Math.sin(rad);

  // max chars per line based on radial space
  const maxChars = 14;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    if ((cur + ' ' + w).trim().length <= maxChars) {
      cur = (cur + ' ' + w).trim();
    } else {
      if (cur) lines.push(cur);
      cur = w;
    }
  }
  if (cur) lines.push(cur);
  // max 3 lines
  const displayLines = lines.slice(0, 3);

  const lineH = 11;
  const totalH = displayLines.length * lineH;
  const startY = cy - totalH / 2 + lineH / 2;

  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${cx}, ${startY})`);
  g.setAttribute('class', 'seg-text');

  displayLines.forEach((line, li) => {
    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', '0');
    t.setAttribute('y', String(li * lineH));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('fill', color);
    t.setAttribute('font-size', '9.5');
    t.setAttribute('font-weight', '700');
    t.setAttribute('font-family', 'Nunito, sans-serif');
    t.textContent = line;
    g.appendChild(t);
  });

  return g;
}

function renderWheel() {
  checkDay();
  fillWheel();

  const svg = document.getElementById('wheelSvg');
  // remove all children except defs
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Outer ring decoration
  const outerCircle = document.createElementNS(SVG_NS, 'circle');
  outerCircle.setAttribute('cx', '0'); outerCircle.setAttribute('cy', '0');
  outerCircle.setAttribute('r', String(WHEEL_R + 6));
  outerCircle.setAttribute('fill', 'none');
  outerCircle.setAttribute('stroke', 'var(--border)');
  outerCircle.setAttribute('stroke-width', '2');
  svg.appendChild(outerCircle);

  // Inner ring decoration  
  const innerCircle = document.createElementNS(SVG_NS, 'circle');
  innerCircle.setAttribute('cx', '0'); innerCircle.setAttribute('cy', '0');
  innerCircle.setAttribute('r', String(INNER_R - 4));
  innerCircle.setAttribute('fill', 'var(--panel)');
  innerCircle.setAttribute('stroke', 'var(--border)');
  innerCircle.setAttribute('stroke-width', '1.5');
  svg.appendChild(innerCircle);

  for (let i = 0; i < WHEEL_SLOTS; i++) {
    const taskId = state.wheel[i];
    const task = taskId ? getTask(taskId) : null;

    const segG = document.createElementNS(SVG_NS, 'g');
    segG.setAttribute('data-slot', String(i));
    segG.style.cursor = 'pointer';

    // Segment fill
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', segPath(i, WHEEL_SLOTS, WHEEL_R, INNER_R));
    const color = task ? getCatColor(task.catId) : '#e8d8c4';
    path.setAttribute('fill', task ? color + '33' : '#f5ede0');
    path.setAttribute('stroke', task ? color : 'var(--border)');
    path.setAttribute('stroke-width', '1.5');
    path.style.transition = 'fill 0.2s, stroke 0.2s';
    segG.appendChild(path);

    if (task) {
      // Task label
      const textG = textOnSeg(i, WHEEL_SLOTS, task.name, color);
      segG.appendChild(textG);

      // Avg time hint (tiny, bottom of seg)
      const avg = avgTime(task);
      if (avg) {
        const sliceDeg = 360 / WHEEL_SLOTS;
        const midDeg = i * sliceDeg + sliceDeg / 2 - 90;
        const hintR = WHEEL_R - 12;
        const rad = degToRad(midDeg);
        const hx = hintR * Math.cos(rad);
        const hy = hintR * Math.sin(rad);
        const hint = document.createElementNS(SVG_NS, 'text');
        hint.setAttribute('x', String(hx));
        hint.setAttribute('y', String(hy));
        hint.setAttribute('text-anchor', 'middle');
        hint.setAttribute('dominant-baseline', 'middle');
        hint.setAttribute('fill', color);
        hint.setAttribute('fill-opacity', '0.7');
        hint.setAttribute('font-size', '7.5');
        hint.setAttribute('font-weight', '700');
        hint.setAttribute('font-family', 'Nunito, sans-serif');
        hint.setAttribute('class', 'seg-text');
        hint.textContent = '~' + fmtTime(avg);
        segG.appendChild(hint);
      }

      // Events
      segG.addEventListener('click', (e) => { e.stopPropagation(); handleSegClick(i); });
      segG.addEventListener('contextmenu', (e) => { e.preventDefault(); handleSegSwap(i); });

      // Long press for mobile swap
      let pressTimer;
      segG.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => { handleSegSwap(i); }, 500);
      }, { passive: true });
      segG.addEventListener('touchend', () => clearTimeout(pressTimer));
      segG.addEventListener('touchmove', () => clearTimeout(pressTimer));

      // Hover highlight
      segG.addEventListener('mouseenter', () => {
        path.setAttribute('fill', color + '55');
      });
      segG.addEventListener('mouseleave', () => {
        path.setAttribute('fill', color + '33');
      });

    } else {
      // Empty slot — tap to fill from pool
      const emptyText = document.createElementNS(SVG_NS, 'text');
      const sliceDeg = 360 / WHEEL_SLOTS;
      const midDeg = i * sliceDeg + sliceDeg / 2 - 90;
      const midR = (WHEEL_R + INNER_R) / 2;
      const rad = degToRad(midDeg);
      emptyText.setAttribute('x', String(midR * Math.cos(rad)));
      emptyText.setAttribute('y', String(midR * Math.sin(rad)));
      emptyText.setAttribute('text-anchor', 'middle');
      emptyText.setAttribute('dominant-baseline', 'middle');
      emptyText.setAttribute('fill', 'var(--text3)');
      emptyText.setAttribute('font-size', '16');
      emptyText.textContent = '＋';
      segG.appendChild(emptyText);
      segG.addEventListener('click', () => fillSlotFromPool(i));
    }

    svg.appendChild(segG);
  }

  // Update done count
  const dc = document.getElementById('doneCount');
  dc.textContent = state.doneToday + ' done today' + (state.doneToday >= 8 ? ' 🎉' : '');

  // Pool count
  const pool = poolTasks();
  document.getElementById('poolCount').textContent = pool.length + ' more in pool';

  // Size SVG for viewport
  sizeSvg();
}

function sizeSvg() {
  const vw = Math.min(window.innerWidth - 40, 460);
  const vh = window.innerHeight - 180;
  const size = Math.min(vw, vh, 460);
  const svg = document.getElementById('wheelSvg');
  svg.style.width = size + 'px';
  svg.style.height = size + 'px';
  // Centre button
  const cb = document.querySelector('.centre-btn');
  const btnSize = Math.max(60, size * 0.17);
  cb.style.width = btnSize + 'px';
  cb.style.height = btnSize + 'px';
}

window.addEventListener('resize', () => { sizeSvg(); });

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function handleSegClick(slotIndex) {
  const taskId = state.wheel[slotIndex];
  if (!taskId) return;
  openTaskDetail(taskId, slotIndex);
}

function handleSegSwap(slotIndex) {
  const taskId = state.wheel[slotIndex];
  const pool = poolTasks();
  if (!pool.length) { toast('No more tasks in the pool! Add some in settings ⚙️'); return; }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.wheel[slotIndex] = pick.id;
  saveState();
  renderWheel();
  toast('Swapped for: ' + pick.name.slice(0, 30) + (pick.name.length > 30 ? '…' : ''));
}

function fillSlotFromPool(slotIndex) {
  const pool = poolTasks();
  if (!pool.length) { toast('Pool empty — add tasks in settings ⚙️'); return; }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  state.wheel[slotIndex] = pick.id;
  saveState();
  renderWheel();
}

function markDone(slotIndex, taskId, duration) {
  const task = getTask(taskId);
  if (!task) return;
  if (!task.history) task.history = [];
  task.history.push({
    date: new Date().toISOString(),
    duration: duration || 0,
  });
  // Keep last 20 completions
  if (task.history.length > 20) task.history = task.history.slice(-20);

  state.wheel[slotIndex] = null;
  state.doneToday = (state.doneToday || 0) + 1;
  saveState();
  renderWheel();
  toast('✅ Done! Great work 🌟');
}

document.getElementById('shuffleAllBtn').addEventListener('click', () => {
  const all = shuffle([...state.tasks]);
  state.wheel = all.slice(0, WHEEL_SLOTS).map(t => t.id);
  saveState();
  renderWheel();
  toast('🔀 Wheel shuffled!');
});

document.getElementById('centreBtn').addEventListener('click', () => {
  const d = new Date();
  document.getElementById('centreLabel').textContent =
    d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  setTimeout(() => {
    document.getElementById('centreLabel').textContent = 'Today';
  }, 3000);
});

// ─────────────────────────────────────────────
//  TASK DETAIL MODAL
// ─────────────────────────────────────────────
let activeDetailSlot = null;
let activeDetailTask = null;
let detailTimerInterval = null;
let detailTimerMs = 0;
let detailTimerRunning = false;
let detailTimerStart = null;

function openTaskDetail(taskId, slotIndex) {
  activeDetailSlot = slotIndex;
  activeDetailTask = getTask(taskId);
  if (!activeDetailTask) return;

  detailTimerMs = 0;
  detailTimerRunning = false;
  clearInterval(detailTimerInterval);

  renderDetailContent();
  document.getElementById('detailOverlay').classList.add('open');
}

function renderDetailContent() {
  const task = activeDetailTask;
  const cat = getCat(task.catId);
  const color = getCatColor(task.catId);
  const avg = avgTime(task);
  const completions = (task.history || []).length;
  const lastDone = task.history && task.history.length
    ? new Date(task.history[task.history.length - 1].date).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })
    : 'Never';

  const mins = String(Math.floor(detailTimerMs / 60000)).padStart(2, '0');
  const secs = String(Math.floor((detailTimerMs % 60000) / 1000)).padStart(2, '0');

  document.getElementById('detailContent').innerHTML = `
    <div class="task-detail-name">${task.name}</div>
    <span class="task-detail-cat" style="background:${color}22;color:${color}">
      ${getCatName(task.catId)}
    </span>

    <div class="task-history-row">
      <span class="task-history-label">✅ Times done</span>
      <span class="task-history-val">${completions}</span>
    </div>
    <div class="task-history-row">
      <span class="task-history-label">⏱ Avg time</span>
      <span class="task-history-val">${avg ? fmtTime(avg) : '—'}</span>
    </div>
    <div class="task-history-row">
      <span class="task-history-label">📅 Last done</span>
      <span class="task-history-val">${lastDone}</span>
    </div>

    <div class="mini-timer">
      <div class="mini-timer-label">Task timer</div>
      <div class="mini-timer-time" id="detailTimerDisplay">${mins}:${secs}</div>
      <div class="timer-btns" style="margin-top:12px">
        <button class="tbtn primary" id="timerToggleBtn">${detailTimerRunning ? '⏸ Pause' : '▶ Start'}</button>
        <button class="tbtn" id="timerResetBtn">↺ Reset</button>
        <button class="tbtn done-btn" id="markDoneBtn">✅ Done!</button>
      </div>
    </div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:center;">
      <button class="tbtn" id="swapDetailBtn" style="font-size:0.75rem">🔀 Swap task</button>
    </div>
  `;

  document.getElementById('timerToggleBtn').addEventListener('click', toggleDetailTimer);
  document.getElementById('timerResetBtn').addEventListener('click', resetDetailTimer);
  document.getElementById('markDoneBtn').addEventListener('click', () => {
    const dur = detailTimerMs;
    clearInterval(detailTimerInterval);
    detailTimerRunning = false;
    closeDetailModal();
    markDone(activeDetailSlot, activeDetailTask.id, dur);
  });
  document.getElementById('swapDetailBtn').addEventListener('click', () => {
    closeDetailModal();
    handleSegSwap(activeDetailSlot);
  });
}

function toggleDetailTimer() {
  if (detailTimerRunning) {
    clearInterval(detailTimerInterval);
    detailTimerRunning = false;
  } else {
    detailTimerStart = Date.now() - detailTimerMs;
    detailTimerInterval = setInterval(() => {
      detailTimerMs = Date.now() - detailTimerStart;
      updateDetailTimerDisplay();
    }, 500);
    detailTimerRunning = true;
  }
  const btn = document.getElementById('timerToggleBtn');
  if (btn) btn.textContent = detailTimerRunning ? '⏸ Pause' : '▶ Start';
}

function resetDetailTimer() {
  clearInterval(detailTimerInterval);
  detailTimerRunning = false;
  detailTimerMs = 0;
  updateDetailTimerDisplay();
  const btn = document.getElementById('timerToggleBtn');
  if (btn) btn.textContent = '▶ Start';
}

function updateDetailTimerDisplay() {
  const el = document.getElementById('detailTimerDisplay');
  if (!el) return;
  const mins = String(Math.floor(detailTimerMs / 60000)).padStart(2, '0');
  const secs = String(Math.floor((detailTimerMs % 60000) / 1000)).padStart(2, '0');
  el.textContent = `${mins}:${secs}`;
}

function closeDetailModal() {
  clearInterval(detailTimerInterval);
  detailTimerRunning = false;
  document.getElementById('detailOverlay').classList.remove('open');
}

document.getElementById('detailClose').addEventListener('click', closeDetailModal);
document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detailOverlay')) closeDetailModal();
});

// ─────────────────────────────────────────────
//  SETUP SCREEN
// ─────────────────────────────────────────────
document.getElementById('setupBtn').addEventListener('click', () => {
  showScreen('setupScreen');
  renderSetup();
});
document.getElementById('backBtn').addEventListener('click', () => {
  saveState();
  fillWheel();
  showScreen('wheelScreen');
  renderWheel();
});
document.getElementById('saveSetupBtn').addEventListener('click', () => {
  saveState();
  fillWheel();
  showScreen('wheelScreen');
  renderWheel();
  toast('✅ Saved! Wheel updated.');
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderSetup() {
  renderCatList();
  renderTaskPool();
}

function renderCatList() {
  const el = document.getElementById('catList');
  el.innerHTML = '';
  state.categories.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <div class="cat-color-swatch" style="background:${cat.color}" title="Click to change colour" data-catid="${cat.id}"></div>
      <input type="color" class="color-pick" data-catid="${cat.id}" value="${cat.color}">
      <input class="cat-name-input" value="${cat.name}" data-catid="${cat.id}" maxlength="24">
      <button class="cat-del" data-catid="${cat.id}" title="Delete category">🗑</button>
    `;
    const swatch = row.querySelector('.cat-color-swatch');
    const picker = row.querySelector('.color-pick');
    swatch.addEventListener('click', () => picker.click());
    picker.addEventListener('input', (e) => {
      cat.color = e.target.value;
      swatch.style.background = cat.color;
      saveState();
    });
    row.querySelector('.cat-name-input').addEventListener('input', (e) => {
      cat.name = e.target.value;
    });
    row.querySelector('.cat-del').addEventListener('click', () => {
      if (state.categories.length <= 1) { toast('Need at least one category!'); return; }
      // Reassign tasks with this cat
      state.tasks.forEach(t => { if (t.catId === cat.id) t.catId = state.categories[0].id; });
      state.categories = state.categories.filter(c => c.id !== cat.id);
      saveState();
      renderCatList();
      renderTaskPool();
    });
    el.appendChild(row);
  });
}

document.getElementById('addCatBtn').addEventListener('click', () => {
  const inp = document.getElementById('newCatInput');
  const name = inp.value.trim();
  if (!name) return;
  const colors = ['#9a80c0','#d07090','#6dbf9e','#7ab3d4','#e8832a'];
  const color = colors[state.categories.length % colors.length];
  state.categories.push({ id: uid(), name, color });
  inp.value = '';
  saveState();
  renderCatList();
  renderTaskPool();
});

function renderTaskPool() {
  const el = document.getElementById('taskPoolList');
  el.innerHTML = '';

  if (!state.tasks.length) {
    el.innerHTML = '<div class="empty-msg">No tasks yet. Add some below! ✨</div>';
    return;
  }

  state.tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-list-item';

    const color = getCatColor(task.catId);
    const catOptions = state.categories.map(c =>
      `<option value="${c.id}"${c.id === task.catId ? ' selected' : ''}>${c.name}</option>`
    ).join('');

    item.innerHTML = `
      <div class="task-list-dot" style="background:${color}" data-tid="${task.id}" title="Colour = category"></div>
      <input class="task-list-name" value="${task.name}" data-tid="${task.id}" maxlength="60">
      <select class="task-cat-select" data-tid="${task.id}" style="color:${color}; border-color:${color}40">
        ${catOptions}
      </select>
      <button class="task-del-btn" data-tid="${task.id}" title="Remove task">✕</button>
    `;

    item.querySelector('.task-list-name').addEventListener('input', (e) => {
      task.name = e.target.value;
    });
    item.querySelector('.task-cat-select').addEventListener('change', (e) => {
      task.catId = e.target.value;
      const newColor = getCatColor(task.catId);
      item.querySelector('.task-list-dot').style.background = newColor;
      e.target.style.color = newColor;
    });
    item.querySelector('.task-del-btn').addEventListener('click', () => {
      // remove from wheel too
      state.wheel = state.wheel.map(id => id === task.id ? null : id);
      state.tasks = state.tasks.filter(t => t.id !== task.id);
      saveState();
      renderTaskPool();
    });

    el.appendChild(item);
  });
}

document.getElementById('addTaskBtn').addEventListener('click', addNewTask);
document.getElementById('newTaskInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addNewTask();
});

function addNewTask() {
  const inp = document.getElementById('newTaskInput');
  const name = inp.value.trim();
  if (!name) return;
  const catId = state.categories.length ? state.categories[0].id : null;
  state.tasks.push({ id: uid(), name, catId, history: [] });
  inp.value = '';
  saveState();
  renderTaskPool();
  toast('Task added to pool ✨');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
checkDay();
fillWheel();
renderWheel();
</script>
</body>
</html>
